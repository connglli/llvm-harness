prompt: |
  Review the following LLVM patch for fixing the given LLVM issue.

  ## LLVM Patch to Review

  ```diff
  {patch_diff}
  ```

  ## LLVM Issue Reproduction

  Type: {issue_type}

  Reproducer (LLVM IR): ```bash
  cat {issue_rep_path}
  {issue_rep_code}
  ```

  LLVM's Symptom: ```bash
  {issue_command}
  {issue_symptom}
  ```

  ## Information

  - The root directory of the LLVM project is: {llvm_dir}
  - The build directory is: {build_dir}

  ## Workflow

  The following independent review skills are available, each focused on a
  different class of issue:

    - `llvm-patchreview-integrity`                  — Unexpected Assertion Change + Unexpected Bypass
    - `llvm-patchreview-correctness-crash`          — New Crash Bugs + Lacking Generality
    - `llvm-patchreview-correctness-miscompilation` — New Miscompilation Bugs + Lacking Generality
    - `llvm-patchreview-performance`                — Missed Optimizations + Hangs / Compile-time Blowups

  Run all skills in order or in parallel. Each one produces a report with YAML
  frontmatter containing its own `verdict` (APPROVE / REVISE / REJECT).

  1. Run `llvm-patchreview-integrity`; capture its full report.
  2. Run `llvm-patchreview-correctness-crash`; capture its full report.
  2. Run `llvm-patchreview-correctness-miscompilation`; capture its full report.
  3. Run `llvm-patchreview-performance`; capture its full report.
  4. Derive an aggregated verdict using this rule:
       - any REJECT       → REJECT
       - else any REVISE  → REVISE
       - else             → APPROVE
  5. Write a single combined report to {report_path} in the structure
     below, then you are done. Transform each individual report as needed to
     fit into the combined report, but keep their content verbatim.

  When running each skill, pass the necessary context (e.g., reproducer,
  patch, etc.) into it (excluding the previous reports, which it doesn't need).

  ## Output structure

  ------------------------------ BEGIN STRUCTURE ------------------------------
  ---
  verdict: <aggregated verdict>
  ---

  # Patch Review Report

  ## Summary

  <summarize the review reports of the three skills in a few sentences,
  highlighting the most important points from each>

  ## Aggregated Verdict

  <one short paragraph explaining how the aggregate was derived from the
  three individual verdicts — e.g. "integrity APPROVE, correctness REVISE,
  performance APPROVE → REVISE">

  ## Integrity Review

  <transformed verbatim report from llvm-patchreview-integrity, including
  its own YAML frontmatter>

  ## Crash Review

  <transformed verbatim report from llvm-patchreview-correctness-crash,
  including its own YAML frontmatter>

  ## Miscompilation Review

  <transformed verbatim report from llvm-patchreview-correctness-miscompilation,
  including its own YAML frontmatter>

  ## Performance Review

  <transformed verbatim report from llvm-patchreview-performance, including
  its own YAML frontmatter>
  ------------------------------ END STRUCTURE ------------------------------
