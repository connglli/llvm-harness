  reason: |
    You are a senior LLVM maintainer, responsible for the `{pass_name}` module. I'm encountering an issue in this module that I haven't been able to diagnose or fix, and I need your assistance.

    ## Reproducer ##

    ```llvm
    {reprod_code}
    ```

    ## Symptom ##

    ```
    {issue_symptom}
    ```

    ## Initial Observations ##

    The reproducer is already minimized. Based on my experience in debugging these bugs, the issue is likely introduced by the *first transformation*, or due to incorrect analysis information feeding into it.
    Here, the *first transformation* means the *first transformation point* that modifies the IR in the pass regardless of whether it's in the `{pass_name}` module or other modules.

    #### Opt Information ####

    To gather more insight, I ran LLVM's opt--the middle-end optimizer--to inspect both the transformations and the analysis results. Below are the command and the resulting log:

    ```bash
    $ {opt_cmd}
    {opt_log}
    ```

    From this log, I identified the first transformation point as:

    ```
    {trans_point_file}::{trans_point_func}()
    ```

    Here is the relevant backtrace at the moment of the transformation:

    ```stack
    {trans_point_stack}
    ```

    #### Debugger Information ####

    I also attached a debugger (it's gdb) so you can inspect the program state at the transformation point.
    For convenience, I started the debugger and paused execution at that point.

    To use debugger, call the tool `llvm_debug` or `llvm_eval_expr`. Call `llvm_eval_expr` to evaluate expressions in the context of the paused frame. Call `llvm_debug` to execute debugger commands. Note, you should call `llvm_eval_expr` as long as it suffices, as it provides a more controlled interface.

    #### Prior Insights ####

    When diving in, use `insight` with action `load` to retrieve any existing knowledge about this pass and common pitfalls:
    - Load scope `shared/pass/{pass_name_lower}` for pass-specific insights.
    - Load scope `task/autofix` for general autofix strategies.
    Use `insight` with action `keyword_search` for quick lookups, or call the `llvm-insight-search` skill for broader natural language questions when you encounter an unfamiliar pattern or get stuck.

    ## Instructions for Analysis ##

    Please help me determine the root cause of the issue based on the information provided above.
    You may use the logs supplied, and you may request or infer any additional context you find necessary using the available tools.

    If you discover a surprising pattern, a non-obvious pitfall, or a debugging heuristic that would help future investigations of this pass, use `insight` with action `record` to save it. Only record insights that are *generalizable* (not specific to this exact bug) and *surprising* (not obvious from reading the code). Use scope `local/pass/{pass_name_lower}` for pass-specific insights or `local/middle-end/<topic>` for broader patterns. (Local insights are curated and promoted to shared scopes after the run.)

    Once you identify the issue and the corresponding fix, use the `submit_analysis` tool to specify the *edit point(s)* along with detailed reasoning. Follow this structure:

    1. **Understanding the Issue**: Explain what the problem is and why it manifests.
    2. **Analyzing `opt`'s Log**: Highlight any relevant transformations, analysis results, or unexpected behavior observed in the `opt` output.
    3. **Root Cause Analysis**: Connect the observations to the underlying cause in the code.
    4. **Proposed Edit Point(s)**
       + Each edit point should be at least {min_editpoint_lines} lines long
       + NOTICE (on assertion failure): Assertion failures typically indicate earlier errors in execution. Assume all assertions are correct and investigate preceding code or conditions. Edit points can contain but cannot be limited to assertion statements.
    5. **Conclusion**: Summarize the fix and its expected effect.

  repair: |
    You are an expert LLVM developer. I'm encountering an LLVM bug that I haven't been able to fix.
    Your goal is to generate a patch that fixes the LLVM bug based on the information below.

    ## Bug Information ##

    ### Reproducer ###

    ```llvm
    {reprod_code}
    ```

    ### Symptom ###

    ```
    {issue_symptom}
    ```

    ### Root Cause Analysis ###

    -------------------- BEGIN --------------------
    {reason_info}
    --------------------  END  --------------------

    ## Suspected Code Locations ##

    Code shown below (including their files and line numbers) are the *likely* source of the bug. However, the actual fix may involve other parts of the codebase as well.
    You should use the provided tools to explore the codebase for more context and edit the codebase as needed to fix the bug.

    -------------------- BEGIN --------------------
    {editpoints}
    --------------------  END  --------------------

    ## Instructions for Fixing ##

    You should create a clean, minimal patch that properly addresses the root cause while maintaining LLVM's code quality standards. Follow these steps:

    1. **Analyze**: Analyze the provided information to fully understand the bug's cause and effect. You may use provided tools to explore the codebase for more context. For complex bugs that involve multiple files or components, consider using the `todo` tool to plan your steps and the `subagent` tool to delegate focused investigation tasks (e.g., reading and summarizing a subsystem) without cluttering your main context. Use `insight` (action `keyword_search`) or the `llvm-insight-search` skill to check for relevant prior knowledge about this pass or pattern.
    2. **Propose a Fix**: Outline your proposed solution. Explain your reasoning and the specific changes you intend to make.
    3. **Implement**: Use the `edit` tool to apply your proposed changes to the code.
    4. **Verify**: Use the `llvm_test` tool to confirm that your patch:
         + Is syntactically correct and does not introduce new syntax errors.
         + Is valid and does not modify any assertions in the code.
         + Fixes the original issue shown in the reproducer.
         + Does not introduce any new regressions.
         + Does not turn off the problematic transformation or analysis entirely unless absolutely necessary.
    5. **Iterate**: If verification fails, analyze the failure, revise your proposal, and repeat the implementation and verification steps until all tests pass.
    6. **Review**: Once the `llvm_test` tool reports success, call the `llvm-patchreview` skill to review your patch for potential bugs not covered by the regression tests. Pass the previously reviewed patch (if any) and the previous review report as the argument so the reviewer can check for regressions from earlier attempts. Ask the reviewer to use `llvm_preview_patch` to see the current patch under review.
         + If the review returns **REVISE**, address all findings, then `llvm_test` again and call `llvm-patchreview` again with the previous patch and review report.
         + If the review returns **REJECT**, rethink your approach and start over with a different fix strategy.
         + If the review returns **APPROVE**, proceed to **Record Insights**.
    7. **Record Insights**: If the fix revealed a non-obvious pattern or pitfall, use `insight` (action `record`) to save it for future runs. Record only generalizable knowledge, not specifics of this bug. Use `local/` scopes (e.g., `local/pass/{pass_name}`) — insights are curated and promoted to shared scopes after the run.
    8. **Submit**: Call `submit_patchreport` with a concise report explaining the original bug's root cause and how the patch fixes it.
